<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{legal_title}} — GOTTA.BIKE</title>
    <meta name="description" content="{{legal_description}}">
    <meta property="og:title" content="{{legal_title}} — GOTTA.BIKE">
    <meta property="og:description" content="{{legal_description}}">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top site-nav">
        <div class="container">
            <a class="navbar-brand site-brand" href="index.html">GOTTA<span class="brand-dot">.</span>BIKE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#projects">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">

                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Legal Section -->
    <main class="page-main">
        <section class="section-page">
            <div class="container">
                <div class="section-head reveal">
                    <p class="section-kicker">The fine print</p>
                    <h1 class="section-title">{{legal_title}}</h1>
                    <p class="section-sub">Last updated: {{legal_updated}}</p>
                    {{legal_notice}}
                </div>
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="legal-body reveal">{{legal_body}}</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="road-line" aria-hidden="true"></div>
        <div class="container">
            <div class="row align-items-center gy-3 py-4">
                <div class="col-md-4 text-center text-md-start">
                    <a class="site-brand site-brand--footer" href="index.html">GOTTA<span class="brand-dot">.</span>BIKE</a>
                </div>
                <div class="col-md-4 text-center footer-note">
                    <p class="mb-0">&copy; {{year}} GOTTA.BIKE &middot; Vincent Davis</p>
                    <p class="mb-0 footer-legal"><a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a></p>
                </div>

                    <a href="https://www.linkedin.com/in/vincentdavis/" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>

</html>
